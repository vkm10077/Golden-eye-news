<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Golden Eye News</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<header class="top-header">

    <div class="brand">
        <div class="logo">GE</div>

        <div>
            <h1>Golden Eye</h1>
            <p>Global News Intelligence</p>
        </div>
    </div>

    <div class="live-status">
        <span></span>
        LIVE
    </div>

</header>


<main class="container">

    <section class="control-card">

        <div class="section-title">
            <div>
                <h2>Alert Control</h2>
                <p>
                    Important news पर notification और Hindi audio
                </p>
            </div>
        </div>

        <div class="control-buttons">

            <button
                id="notificationButton"
                onclick="enableNotifications()"
            >
                🔔 Enable Notifications
            </button>

            <button
                id="audioButton"
                onclick="enableAudioAlerts()"
            >
                🔊 Enable Audio Alerts
            </button>

            <button onclick="testAlert()">
                🧪 Test Alert
            </button>

        </div>

        <div class="settings-row">

            <label>
                <input
                    type="checkbox"
                    id="criticalOnly"
                >
                Critical only
            </label>

            <label>
                <input
                    type="checkbox"
                    id="hindiVoice"
                    checked
                >
                Hindi voice
            </label>

            <label>
                <input
                    type="checkbox"
                    id="autoRefresh"
                    checked
                >
                Auto refresh
            </label>

        </div>

    </section>


    <section class="breaking-card">

        <div class="breaking-label">
            🚨 BREAKING
        </div>

        <div>
            <h2 id="breakingHeadline">
                Golden Eye monitoring active
            </h2>

            <p id="breakingSummary">
                Latest important news loading...
            </p>
        </div>

    </section>


    <section class="category-section">

        <div class="category-scroll">

            <button
                class="category active"
                data-category="all"
            >
                All
            </button>

            <button
                class="category"
                data-category="market"
            >
                📈 Market
            </button>

            <button
                class="category"
                data-category="company"
            >
                🏢 Company
            </button>

            <button
                class="category"
                data-category="global"
            >
                🌍 Global
            </button>

            <button
                class="category"
                data-category="commodity"
            >
                🛢 Commodity
            </button>

            <button
                class="category"
                data-category="geopolitical"
            >
                🛡 Geopolitical
            </button>

            <button
                class="category"
                data-category="military"
            >
                ⚔ Military
            </button>

            <button
                class="category"
                data-category="weather"
            >
                🌧 Weather
            </button>

            <button
                class="category"
                data-category="disaster"
            >
                🌋 Disaster
            </button>

        </div>

    </section>


    <section class="news-heading">

        <div>
            <h2>Important News</h2>

            <p id="statusText">
                Latest news loading...
            </p>
        </div>

        <div class="refresh-area">

            <span id="countdownText">
                Refresh in 60s
            </span>

            <button
                id="refreshButton"
                onclick="loadNews()"
            >
                ↻ Refresh
            </button>

        </div>

    </section>


    <section
        id="newsContainer"
        class="news-list"
    ></section>

</main>


<template id="newsCardTemplate">

    <article class="news-card">

        <div class="news-top">

            <span class="priority"></span>

            <span class="news-time"></span>

        </div>

        <h3
            class="headline"
            role="button"
            tabindex="0"
        ></h3>

        <p class="summary"></p>

        <div class="news-information">

            <span class="impact"></span>

            <span class="sentiment"></span>

            <span class="source"></span>

        </div>

        <div class="affected-list"></div>

        <div class="full-detail hidden">

            <h4>पूरी खबर</h4>

            <p class="detail-text"></p>

            <div class="detail-actions">

                <button class="full-audio-button">
                    🔊 पूरी खबर सुनें
                </button>

                <a
                    class="source-button"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    Original Source
                </a>

            </div>

        </div>

        <div class="news-actions">

            <button class="listen-button">
                ▶ पूरी खबर सुनें
            </button>

            <button class="expand-button">
                पूरी खबर खोलें
            </button>

        </div>

    </article>

</template>


<script
    src="{{ url_for('static', filename='app.js') }}"
></script>

</body>
</html>
